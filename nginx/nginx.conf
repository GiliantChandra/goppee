worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # ─── Security Headers ──────────────────────────────────────────────────────
  add_header X-Frame-Options              "DENY" always;
  add_header X-Content-Type-Options       "nosniff" always;
  add_header X-XSS-Protection             "1; mode=block" always;
  add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
  add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains; preload" always;
  add_header Content-Security-Policy      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; object-src 'none';" always;

  # ─── Hide Nginx version ────────────────────────────────────────────────────
  server_tokens off;

  # ─── HTTP → HTTPS redirect ─────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ─── HTTPS Server ──────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # Modern TLS settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── API proxy to backend ────────────────────────────────────────────────
    location /api/ {
      proxy_pass         http://api:4000;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Security: limit upload size
      client_max_body_size 1m;
    }

    # ─── React SPA (static files) ────────────────────────────────────────────
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;  # SPA fallback
    }
  }
}
